
name: perf-registraduria

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
    paths:
      - 'perf/**'
      - 'registraduria/**'

jobs:

  # ─── Job 1: Compilar + prueba de regresión (gate de calidad) ─────────────
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Compilar aplicación Spring Boot
        working-directory: registraduria
        run: mvn clean package -DskipTests -q

      - name: Iniciar aplicación en background
        working-directory: registraduria
        run: |
          java -jar target/*.jar &
          echo "Esperando que el puerto 8080 esté disponible..."
          for i in {1..30}; do
            if nc -z localhost 8080 2>/dev/null; then
              echo "✅ Puerto 8080 abierto (intento $i)"
              sleep 2
              break
            fi
            echo "  intento $i/30..."
            sleep 3
          done

      - name: Instalar k6
        run: |
          sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg \
            < <(curl -s https://dl.k6.io/key.gpg)
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q && sudo apt-get install -y k6

      - name: Regression – persons (20 VUs × 5 min)
        run: |
          k6 run perf/scripts/register_person_k6.js \
            -o json=perf/results/ci-regression-persons.json \
            --env BASE_URL=http://localhost:8080 \
            --env SCENARIO=regression
        continue-on-error: true

      - name: Regression – voters (20 VUs × 5 min)
        run: |
          k6 run perf/scripts/voter_k6.js \
            -o json=perf/results/ci-regression-voters.json \
            --env BASE_URL=http://localhost:8080 \
            --env SCENARIO=regression
        continue-on-error: true

      - name: Verificar SLOs (quality gate)
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys
          files = glob.glob('perf/results/ci-regression-*.json')
          if not files:
              print("⚠️  No se encontraron archivos de resultados k6")
              sys.exit(0)
          failed = False
          for f in files:
              with open(f) as fh:
                  data = json.load(fh)
              m   = data.get('metrics', {})
              dur = m.get('http_req_duration', {}).get('values', {})
              er  = m.get('http_req_failed',   {}).get('values', {}).get('rate', 0)
              p95 = dur.get('p(95)', 0)
              p99 = dur.get('p(99)', 0)
              print(f"📊 {f}: p95={p95:.1f}ms  p99={p99:.1f}ms  error_rate={er*100:.2f}%")
              if p95 > 300: print(f"   ❌ SLO-01: p95={p95:.1f}ms > 300ms"); failed = True
              if p99 > 800: print(f"   ❌ SLO-02: p99={p99:.1f}ms > 800ms"); failed = True
              if er  > 0.01: print(f"   ❌ SLO-03: error_rate={er*100:.2f}% > 1%"); failed = True
              if not failed: print("   ✅ Todos los SLOs cumplidos")
          sys.exit(1 if failed else 0)
          PYEOF

      - name: Publicar resultados como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-regression-${{ github.run_number }}
          path: perf/results/
          retention-days: 30

      - name: Resumen en Job Summary
        if: always()
        run: |
          echo "## 📊 Prueba de Regresión – Resultados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 - <<'PYEOF'
          import json, glob, os
          files = glob.glob('perf/results/ci-regression-*.json')
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          lines = ["| Archivo | p95 | p99 | Error% | SLO |", "|---------|----:|----:|-------:|-----|"]
          for f in files:
              try:
                  with open(f) as fh:
                      data = json.load(fh)
                  dur = data.get('metrics', {}).get('http_req_duration', {}).get('values', {})
                  er  = data.get('metrics', {}).get('http_req_failed',   {}).get('values', {}).get('rate', 0)
                  p95 = dur.get('p(95)', 0)
                  p99 = dur.get('p(99)', 0)
                  ok  = '✅' if (p95 <= 300 and p99 <= 800 and er <= 0.01) else '❌'
                  lines.append(f"| {f.split('/')[-1]} | {p95:.1f}ms | {p99:.1f}ms | {er*100:.2f}% | {ok} |")
              except Exception as e:
                  lines.append(f"| {f} | - | - | - | ⚠️ |")
          with open(summary_path, 'a') as sf:
              sf.write('\n'.join(lines) + '\n')
          PYEOF

  # ─── Job 2: Baseline + Load (solo en main) ───────────────────────────────
  full-load:
    needs: regression
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Compilar y arrancar app
        working-directory: registraduria
        run: |
          mvn clean package -DskipTests -q
          java -jar target/*.jar &
          for i in {1..30}; do
            nc -z localhost 8080 2>/dev/null && break || sleep 3
          done
          sleep 2

      - name: Instalar k6
        run: |
          sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg \
            < <(curl -s https://dl.k6.io/key.gpg)
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q && sudo apt-get install -y k6

      - name: Baseline (20 VUs × 5 min)
        run: |
          k6 run perf/scripts/register_person_k6.js \
            -o json=perf/results/baseline.json \
            --env BASE_URL=http://localhost:8080 \
            --env SCENARIO=baseline
        continue-on-error: true

      - name: Load (0→200 VUs, 14 min)
        run: |
          k6 run perf/scripts/register_person_k6.js \
            -o json=perf/results/load.json \
            --env BASE_URL=http://localhost:8080 \
            --env SCENARIO=load
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-full-load-${{ github.run_number }}
          path: perf/results/
          retention-days: 90
