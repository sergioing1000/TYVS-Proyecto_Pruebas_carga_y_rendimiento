
name: perf-registraduria

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
    paths:
      - 'perf/**'
      - 'registraduria/**'

jobs:

  # ─── Job 1: Compilar la aplicación ───────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registraduria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - run: mvn clean package -DskipTests -q
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: registraduria/target/*.jar
          retention-days: 1

  # ─── Job 2: Prueba de regresión (gate de calidad) ────────────────────────
  regression:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: registraduria/target/
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Iniciar aplicación Spring Boot
        run: |
          java -jar registraduria/target/*.jar &
          for i in {1..20}; do
            curl -sf http://localhost:8080/register > /dev/null 2>&1 && break || sleep 3
          done
          echo "Aplicación lista"

      - name: Instalar k6
        run: |
          sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg \
            < <(curl -s https://dl.k6.io/key.gpg)
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q && sudo apt-get install -y k6

      - name: Regression – persons
        env:
          BASE_URL: http://localhost:8080
        run: |
          k6 run perf/scripts/register_person_k6.js \
            -o json=perf/results/regression-persons.json \
            --env BASE_URL="$BASE_URL" \
            --env SCENARIO=regression

      - name: Regression – voters
        env:
          BASE_URL: http://localhost:8080
        run: |
          k6 run perf/scripts/voter_k6.js \
            -o json=perf/results/regression-voters.json \
            --env BASE_URL="$BASE_URL" \
            --env SCENARIO=regression

      - name: Verificar SLOs (quality gate)
        run: |
          python3 - <<'EOF'
          import json, sys, glob
          files = glob.glob('perf/results/regression-*.json')
          failed = False
          for f in files:
            with open(f) as fh:
              data = json.load(fh)
            m   = data.get('metrics', {})
            dur = m.get('http_req_duration', {}).get('values', {})
            er  = m.get('http_req_failed',   {}).get('values', {}).get('rate', 0)
            p95 = dur.get('p(95)', 0)
            p99 = dur.get('p(99)', 0)
            print(f"{f}: p95={p95:.1f}ms p99={p99:.1f}ms error_rate={er*100:.2f}%")
            if p95 > 300: print(f"  ❌ SLO-01 violado: p95={p95:.1f}ms > 300ms"); failed = True
            if p99 > 800: print(f"  ❌ SLO-02 violado: p99={p99:.1f}ms > 800ms"); failed = True
            if er  > 0.01: print(f"  ❌ SLO-03 violado: error_rate={er*100:.2f}% > 1%"); failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Subir artefactos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_number }}
          path: perf/results/**
          retention-days: 30

  # ─── Job 3: Carga + Baseline (solo en main) ──────────────────────────────
  full-load:
    needs: regression
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: app-jar, path: registraduria/target/ }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: temurin }

      - name: Instalar k6
        run: |
          sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg \
            < <(curl -s https://dl.k6.io/key.gpg)
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q && sudo apt-get install -y k6

      - name: Iniciar aplicación
        run: java -jar registraduria/target/*.jar & sleep 15

      - name: Baseline
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL || 'http://localhost:8080' }}
        run: |
          k6 run perf/scripts/register_person_k6.js \
            -o json=perf/results/baseline.json \
            --env BASE_URL="$BASE_URL" --env SCENARIO=baseline

      - name: Load
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL || 'http://localhost:8080' }}
        run: |
          k6 run perf/scripts/register_person_k6.js \
            -o json=perf/results/load.json \
            --env BASE_URL="$BASE_URL" --env SCENARIO=load

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-full-load-${{ github.run_number }}
          path: perf/results/**
          retention-days: 90
