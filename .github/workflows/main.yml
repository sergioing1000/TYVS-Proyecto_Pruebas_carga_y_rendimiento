name: Performance Testing Pipeline

on:
push:
branches:
- main
- master
- develop

pull_request:
branches:
- main
- master

env:
JAVA_VERSION: '17'

jobs:

build:

```
name: Build and Unit Tests
runs-on: ubuntu-latest

defaults:
  run:
    working-directory: registraduria

steps:

  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: ${{ env.JAVA_VERSION }}

  - name: Cache Maven packages
    uses: actions/cache@v4
    with:
      path: ~/.m2
      key: ${{ runner.os }}-maven-${{ hashFiles('registraduria/pom.xml') }}
      restore-keys: |
        ${{ runner.os }}-maven-

  - name: Run Unit Tests
    run: mvn clean test

  - name: Build Application
    run: mvn package -DskipTests

  - name: Upload JAR Artifact
    uses: actions/upload-artifact@v4
    with:
      name: spring-boot-jar
      path: registraduria/target/*.jar
```

regression:

```
name: Regression Performance Tests
runs-on: ubuntu-latest
needs: build

steps:

  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: ${{ env.JAVA_VERSION }}

  - name: Download JAR Artifact
    uses: actions/download-artifact@v4
    with:
      name: spring-boot-jar
      path: registraduria/target

  - name: Install k6
    run: |
      sudo apt-get update
      sudo apt-get install -y gnupg software-properties-common

      curl -fsSL https://dl.k6.io/key.gpg \
        | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg

      echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
        | sudo tee /etc/apt/sources.list.d/k6.list

      sudo apt-get update
      sudo apt-get install -y k6

  - name: Start Spring Boot Application
    run: |
      java -jar registraduria/target/*.jar > application.log 2>&1 &
      echo "Application starting..."
      sleep 25

  - name: Verify Application Startup
    run: |
      curl -v http://localhost:8080 || true

  - name: Run Register Person Regression Test
    run: |
      k6 run \
        -e SCENARIO=regression \
        perf/scripts/register_person_k6.js

  - name: Run Voter Regression Test
    run: |
      k6 run \
        -e SCENARIO=regression \
        perf/scripts/voter_k6.js

  - name: Upload Regression Results
    uses: actions/upload-artifact@v4
    if: always()
    with:
      name: regression-results
      path: |
        perf/results/*.json
        application.log
```

